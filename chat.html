<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyfenix Slim Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05080a;
            --header: #0b0f13;
            --accent: #00f2c3;
            --purple: #a855f7;
            --text-main: #f0f5f8;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; width: 100%; }

        /* --- Header Slim --- */
        .header {
            height: 44px; background: var(--header); display: flex; align-items: center; 
            padding: 0 10px; gap: 8px; border-bottom: 0.5px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .user-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .dp-wrap {
            width: 28px; height: 28px; padding: 1px; flex-shrink: 0;
            background: linear-gradient(45deg, var(--accent), var(--purple));
            border-radius: 8px; box-shadow: 0 0 8px rgba(0, 242, 195, 0.4);
        }
        .dp-wrap img { width: 100%; height: 100%; border-radius: 7px; object-fit: cover; background: #151c22; }
        .u-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .header-actions { display: flex; gap: 12px; font-size: 14px; color: var(--text-dim); }

        /* --- Chat View --- */
        .chat-view { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .msg-container { display: flex; flex-direction: column; max-width: 82%; }
        .me { align-self: flex-end; }
        .other { align-self: flex-start; }
        .msg { padding: 8px 12px; font-size: 12px; border-radius: 12px; line-height: 1.4; }
        .me .msg { background: #162129; border: 0.5px solid rgba(0, 242, 195, 0.2); border-bottom-right-radius: 2px; }
        .other .msg { background: #0e141a; border: 0.5px solid rgba(255, 255, 255, 0.05); border-bottom-left-radius: 2px; }
        
        .del-btn { font-size: 9px; color: #ff4d4d; margin-top: 2px; cursor: pointer; display: none; text-align: right; }
        .me:active .del-btn { display: block; }

        /* --- Fixed Typing Bar (Chota & Screen ke andar) --- */
        .controls { 
            background: var(--header); 
            padding: 8px 0; 
            flex-shrink: 0; 
            border-top: 0.5px solid rgba(255,255,255,0.05);
            width: 100%;
        }
        .input-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            width: 94%; /* 100% se kam kiya taaki side se bahar na jaye */
            margin: 0 auto; /* Screen ke center mein rakhega */
        }

        .input-glow-box {
            flex: 1; background: #141b21; border-radius: 20px; height: 34px;
            display: flex; align-items: center; padding: 0 12px; 
            border: 1px solid rgba(0, 242, 195, 0.3);
            box-shadow: 0 0 10px rgba(0, 242, 195, 0.05);
            min-width: 0; /* Bahar jane se rokta hai */
        }
        .input-glow-box input { 
            flex: 1; background: transparent; border: none; outline: none; 
            color: #fff; font-size: 12px; width: 100%;
        }

        .send-btn {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            display: flex; align-items: center; justify-content: center; 
            color: #000; font-size: 14px; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 242, 195, 0.3);
        }

        .plus-btn { color: var(--accent); font-size: 16px; flex-shrink: 0; }
    </style>
</head>
<body>

    <header class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); font-size: 14px;" onclick="history.back()"></i>
        <div class="user-info">
            <div class="dp-wrap"><img id="uPhoto" src=""></div>
            <div class="u-details">
                <div class="u-name" id="uName">Loading...</div>
                <div style="font-size: 8px; color: var(--accent);">online</div>
            </div>
        </div>
        <div class="header-actions">
            <i class="fas fa-video" style="color:#ff4d4d" onclick="alert('Video Call...')"></i>
            <i class="fas fa-phone" style="color:#34d399" onclick="alert('Voice Call...')"></i>
            <i class="fas fa-ellipsis-vertical" onclick="alert('Menu')"></i>
        </div>
    </header>

    <div class="chat-view" id="chat"></div>

    <div class="controls">
        <div class="input-row">
            <input type="file" id="imgInp" hidden accept="image/*">
            <i class="fas fa-plus plus-btn" onclick="imgInp.click()"></i>
            <div class="input-glow-box">
                <input type="text" id="msgInp" placeholder="Type message...">
            </div>
            <div class="send-btn" onclick="sendMsg()">
                <i class="fas fa-paper-plane"></i>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "indian-chat-61159.firebaseapp.com",
            projectId: "indian-chat-61159",
            storageBucket: "indian-chat-61159.appspot.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();
        const otherUid = new URLSearchParams(window.location.search).get("uid");

        function getChatId(a, b) { return a < b ? a + "_" + b : b + "_" + a; }

        onAuthStateChanged(auth, async user => {
            if(!user || !otherUid) return;

            const snap = await getDoc(doc(db, "users", otherUid));
            if(snap.exists()){
                document.getElementById("uName").innerText = snap.data().name;
                document.getElementById("uPhoto").src = snap.data().photo || "https://i.pravatar.cc/100";
            }

            const q = query(collection(db, "chats", getChatId(user.uid, otherUid), "messages"), orderBy("time"));
            onSnapshot(q, s => {
                chatBox.innerHTML = "";
                s.forEach(d => {
                    const data = d.data();
                    const container = document.createElement("div");
                    container.className = "msg-container " + (data.sender === user.uid ? "me" : "other");
                    container.innerHTML = `<div class="msg">${data.text}</div>${data.sender === user.uid ? `<span class="del-btn" onclick="delMsg('${d.id}')">Delete</span>` : ''}`;
                    chatBox.appendChild(container);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        });

        window.sendMsg = async () => {
            const val = msgInp.value.trim();
            if(!val) return;
            await addDoc(collection(db, "chats", getChatId(auth.currentUser.uid, otherUid), "messages"), {
                text: val, sender: auth.currentUser.uid, time: Date.now()
            });
            msgInp.value = "";
        };

        window.delMsg = async (id) => {
            if(confirm("Delete?")) await deleteDoc(doc(db, "chats", getChatId(auth.currentUser.uid, otherUid), "messages", id));
        };
    </script>
</body>
</html>
