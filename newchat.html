<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyfenix AI Slim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05080a;
            --card: #0b0f13;
            --accent: #00f2c3;
            --text: #f0f5f8;
            --dim: #94a3b8;
        }

        /* Rule 1: Screen ke andar hi rahega sab */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; }
        body { display: flex; flex-direction: column; }

        /* HEADER & NEON SEARCH */
        header {
            background: var(--card); padding: 12px 15px; 
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
        }
        header i { font-size: 16px; color: var(--accent); cursor: pointer; }
        
        .search-wrapper {
            flex: 1; position: relative; display: flex; align-items: center;
        }
        header input {
            width: 100%; background: #0d141a; 
            /* Neon Border for Search */
            border: 1px solid var(--accent);
            box-shadow: 0 0 8px rgba(0, 242, 195, 0.1);
            padding: 7px 15px; border-radius: 12px; color: white; 
            outline: none; font-size: 12px; transition: 0.3s;
        }
        header input:focus { box-shadow: 0 0 12px rgba(0, 242, 195, 0.3); }

        .container { flex: 1; overflow-y: auto; padding-top: 12px; }

        /* SLIM NEON BUTTONS (Wide but thin) */
        .options-list { display: flex; flex-direction: column; gap: 8px; padding: 0 15px; margin-bottom: 15px; }

        .slim-btn {
            background: var(--card); 
            border: 1px solid var(--accent); /* AI Neon Border */
            padding: 8px 15px; border-radius: 10px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; transition: 0.2s;
            box-shadow: 0 0 5px rgba(0, 242, 195, 0.05);
        }
        .slim-btn i {
            font-size: 13px; color: var(--accent);
            filter: drop-shadow(0 0 3px rgba(0, 242, 195, 0.4));
        }
        .slim-btn span { font-size: 12px; font-weight: 500; color: var(--text); }
        .slim-btn:active { transform: scale(0.98); background: rgba(0, 242, 195, 0.05); }

        .label { padding: 0 18px 8px; font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

        /* USER LIST (Compact) */
        .user {
            display: flex; align-items: center; gap: 12px; 
            padding: 10px 18px; border-bottom: 0.5px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }
        .user:active { background: #0d141a; }
        
        .dp-box { 
            width: 36px; height: 36px; border-radius: 8px; 
            overflow: hidden; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1);
        }
        .dp-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .u-info { flex: 1; min-width: 0; }
        .u-info .name { font-size: 13px; font-weight: 600; }
        .u-info .status-txt { font-size: 10px; color: var(--dim); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2a353d; }
        .status-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    </style>
</head>
<body>

<header>
    <i class="fas fa-arrow-left" onclick="history.back()"></i>
    <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search Encrypted Contacts...">
    </div>
</header>

<div class="container">
    <div class="options-list">
        <div class="slim-btn" onclick="window.location.href='addcontact.html'">
            <i class="fas fa-user-plus"></i>
            <span>Add Connection</span>
        </div>
        <div class="slim-btn" onclick="alert('System: AI Group feature initializing...')">
            <i class="fas fa-microchip"></i>
            <span>AI Neural Group</span>
        </div>
    </div>

    <div class="label">Secure Network</div>
    
    <div id="list">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ✅ आपकी सही वाली Firebase Config (Indian-Chat वाली)
    const firebaseConfig = {
        apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
        authDomain: "indian-chat-61159.firebaseapp.com",
        databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",
        projectId: "indian-chat-61159",
        storageBucket: "indian-chat-61159.firebasestorage.app",
        messagingSenderId: "584142839677",
        appId: "1:584142839677:web:40cd744a7fe77dc743f614",
        measurementId: "G-5S9873P202"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const listDiv = document.getElementById("list");

    onAuthStateChanged(auth, user => {
        if (user) {
            console.log("Login User:", user.uid);
            loadMyContacts(user.uid);
        } else {
            // ❌ "Santosh_Kushwaha" वाली लाइन हटा दी, क्योंकि रूल्स सिर्फ असली UID को परमिशन देंगे
            listDiv.innerHTML = `<div style="padding:40px; text-align:center; color:var(--dim); font-size:11px;">Please Login to see connections.</div>`;
        }
    });

    function loadMyContacts(myUid) {
        // ✅ रास्ता बिल्कुल सही: users -> [Your_UID] -> contacts
        const contactsRef = collection(db, "users", myUid, "contacts");

        onSnapshot(contactsRef, (snap) => {
            if (snap.empty) {
                listDiv.innerHTML = `<div style="padding:40px; text-align:center; color:var(--dim); font-size:11px;">Network Empty. No connections found.</div>`;
                return;
            }

            listDiv.innerHTML = ""; 
            
            snap.forEach(cDoc => {
                const cData = cDoc.data();
                const targetUid = cData.uid; // दोस्त की UID

                // दोस्त की असली प्रोफाइल मंगाना
                onSnapshot(doc(db, "users", targetUid), (uSnap) => {
                    const gData = uSnap.data();
                    const existing = document.getElementById("u-" + targetUid);
                    const isOnline = gData?.status === 'online';

                    const html = `
                        <div class="dp-box">
                            <img src="${gData?.photo || 'https://ui-avatars.com/api/?name=' + cData.name + '&background=0D141A&color=00F2C3'}">
                        </div>
                        <div class="u-info">
                            <div class="name">${cData.name || "Unknown"}</div>
                            <div class="status-txt">${isOnline ? 'Active Now' : 'Last seen recently'}</div>
                        </div>
                        <div class="status-dot ${isOnline ? 'active' : ''}"></div>
                    `;

                    if (existing) {
                        existing.innerHTML = html;
                    } else {
                        const div = document.createElement("div");
                        div.className = "user";
                        div.id = "u-" + targetUid;
                        div.onclick = () => window.location.href = `chat.html?uid=${targetUid}`;
                        div.innerHTML = html;
                        listDiv.appendChild(div);
                    }
                });
            });
        }, (err) => {
            console.error("Rules Error Detail:", err);
            listDiv.innerHTML = `<div style="color:red; font-size:10px; text-align:center; padding:20px;">Rules Error: ${err.message}</div>`;
        });
    }

    document.getElementById("search").oninput = function() {
        let val = this.value.toLowerCase();
        document.querySelectorAll(".user").forEach(u => {
            u.style.display = u.innerText.toLowerCase().includes(val) ? "flex" : "none";
        });
    };
</script>

</body>
</html>
