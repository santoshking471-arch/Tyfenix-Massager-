<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Neon AI UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
        }

        body {
            background: #020202;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            width: 88%;
            max-width: 330px;
            padding: 24px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* Neon Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            font-size: 18px;
            transition: 0.3s;
        }
        .back-btn:active { transform: scale(0.8); opacity: 0.7; }

        /* All Inputs Neon Border */
        .premium-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(0, 243, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 10px 12px 10px 42px;
            width: 100%;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .premium-input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px rgba(0, 243, 255, 0.4);
            background: rgba(0, 243, 255, 0.05);
        }

        .input-group {
            position: relative;
            margin-bottom: 14px;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 243, 255, 0.4);
            font-size: 14px;
            transition: 0.3s;
        }

        .premium-input:focus + i {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Neon AI Save Button */
        .ai-btn {
            background: transparent;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto 0;
            border: 2px solid var(--neon-purple);
            cursor: pointer;
            position: relative;
            color: white;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
            transition: 0.3s;
        }

        .ai-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--neon-purple);
            opacity: 0.1;
            z-index: -1;
        }

        .ai-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 25px var(--neon-purple);
        }

        .status-msg {
            font-size: 10px;
            text-align: center;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            height: 15px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="#" class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

        <div class="text-center mb-8">
            <h2 class="text-xl font-bold text-white tracking-widest">CONNECT</h2>
            <div class="h-0.5 w-12 bg-cyan-500 mx-auto mt-1 shadow-[0_0_8px_#00f3ff]"></div>
        </div>

        <form id="neonForm">
            <div class="input-group">
                <input type="text" id="name" placeholder="Contact Name" class="premium-input" required>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" class="premium-input" required>
                <i class="fa-solid fa-at"></i>
            </div>

            <div class="input-group">
                <input type="text" id="targetUid" placeholder="Identity UID" class="premium-input" required>
                <i class="fa-solid fa-qrcode"></i>
            </div>

            <button type="submit" class="ai-btn">
                <i class="fa-solid fa-fingerprint text-2xl"></i>
            </button>
            
            <div id="status" class="status-msg text-cyan-400"></div>
        </form>
    </div>

    <script type="module">
        // Firebase Logic (Same as before, ready for your Config)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
  authDomain: "indian-chat-61159.firebaseapp.com",
  databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",
  projectId: "indian-chat-61159",
  storageBucket: "indian-chat-61159.firebasestorage.app",
  messagingSenderId: "584142839677",
  appId: "1:584142839677:web:40cd744a7fe77dc743f614",
  measurementId: "G-5S9873P202"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('neonForm');
        const statusMsg = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const uid = document.getElementById('targetUid').value;
            
            statusMsg.innerText = "LINKING INTERFACE...";
            
            try {
                const docRef = doc(db, "users", uid);
                const snap = await getDoc(docRef);

                if (snap.exists()) {
                    statusMsg.innerText = "CONNECTION STABLISHED";
                    statusMsg.style.color = "#bc13fe";
                } else {
                    statusMsg.innerText = "ID NOT RECOGNIZED";
                    statusMsg.style.color = "#ff0055";
                }
            } catch (err) {
    console.error(err); // ये चेक करो कि ब्राउज़र के Console में क्या Error आ रहा है
    statusMsg.innerText = "SYSTEM ERROR: " + err.code; 
}

        });
    </script>
</body>
</html>
