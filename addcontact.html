<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Connect Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #00f3ff; --accent: #bc13fe; }
        body { 
            background: #050505; 
            height: 100dvh; /* Mobile Friendly Height */
            display: flex; align-items: center; justify-content: center; 
            margin: 0; overflow: hidden; font-family: 'Inter', sans-serif;
        }
        .ai-container {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 20px;
            width: 85%; max-width: 310px; /* Slim Width */
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .back-btn {
            position: absolute; top: 15px; left: 15px;
            color: var(--neon); font-size: 16px; opacity: 0.8;
        }
        /* Slimmer Input Fields */
        .slim-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            padding: 8px 10px 8px 38px;
            width: 100%; font-size: 13px;
            transition: 0.3s;
        }
        .slim-input:focus {
            outline: none; border-color: var(--neon);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            background: rgba(0, 243, 255, 0.02);
        }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: rgba(0, 243, 255, 0.3); font-size: 13px;
        }
        /* AI Fingerprint Button */
        .scan-btn {
            background: transparent;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 15px auto 0;
            border: 1.5px solid var(--accent);
            cursor: pointer; color: white;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
            transition: 0.3s;
        }
        .scan-btn:active { transform: scale(0.9); filter: brightness(1.2); }
        .status-msg {
            font-size: 9px; text-align: center; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 1.5px; height: 12px;
        }
    </style>
</head>
<body>

    <div class="ai-container">
        <a href="#" class="back-btn" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></a>
        
        <div class="text-center mb-6">
            <h2 class="text-lg font-light text-white tracking-[0.3em]">AI LINK</h2>
            <div class="h-[1px] w-10 bg-cyan-400 mx-auto mt-1"></div>
        </div>

        <form id="neonForm">
            <div class="input-group">
                <input type="text" id="name" placeholder="Full Name" class="slim-input" required>
                <i class="fa-solid fa-user-tag"></i>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Database Email" class="slim-input" required>
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <button type="submit" class="scan-btn">
                <i class="fa-solid fa-fingerprint text-xl"></i>
            </button>
            
            <div id="status" class="status-msg text-cyan-400">READY TO SCAN</div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
            authDomain: "indian-chat-61159.firebaseapp.com",
            databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",
            projectId: "indian-chat-61159",
            storageBucket: "indian-chat-61159.firebasestorage.app",
            messagingSenderId: "584142839677",
            appId: "1:584142839677:web:40cd744a7fe77dc743f614",
            measurementId: "G-5S9873P202"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById('neonForm');
        const statusMsg = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const myUserId = "Santosh_Kushwaha"; 
            const searchEmail = document.getElementById('email').value.toLowerCase().trim();
            const contactDisplayName = document.getElementById('name').value;

            statusMsg.innerText = "AUTHENTICATING...";
            statusMsg.style.color = "#00f3ff";

            try {
                // Email Search in 'users' collection
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("email", "==", searchEmail));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    const foundUser = querySnapshot.docs[0];
                    const foundUserId = foundUser.id; 

                    // Personal Contact Sub-collection
                    const myContactRef = doc(db, "users", myUserId, "contacts", foundUserId);
                    
                    await setDoc(myContactRef, {
                        name: contactDisplayName,
                        email: searchEmail,
                        uid: foundUserId,
                        addedAt: new Date().toISOString()
                    });

                    statusMsg.innerText = "LINK ESTABLISHED";
                    statusMsg.style.color = "#bc13fe";
                    form.reset();
                } else {
                    statusMsg.innerText = "DATABASE ERROR: NO EMAIL";
                    statusMsg.style.color = "#ff0055";
                }
            } catch (err) {
                statusMsg.innerText = "ACCESS DENIED";
                statusMsg.style.color = "#ff0055";
            }
        });
    </script>
</body>
</html>
