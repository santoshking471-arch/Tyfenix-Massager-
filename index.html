<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyfenix | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0f14;
            --card: #161b22;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            width: 85%;
            max-width: 350px;
            padding: 30px 20px;
            background: var(--card);
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area { margin-bottom: 35px; }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            background: #0d1117;
            border-radius: 16px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }

        .input-group i { color: var(--accent); margin-right: 12px; font-size: 18px; }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 0;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .btn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #000;
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.97); }

        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-card fade-in">
        <div class="logo-area">
            <div class="logo-text">TYFENIX</div>
            <p class="tagline">Super Fast Messenger</p>
        </div>

        <div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Continue with Google">
            </div>

            <button class="btn" onclick="googleLogin()">Login with Google</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
            authDomain: "indian-chat-61159.firebaseapp.com",
            databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",
            projectId: "indian-chat-61159",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.googleLogin = function () {
            const provider = new GoogleAuthProvider();

            signInWithPopup(auth, provider)
                .then((result) => {
                    const user = result.user;

                    // 🔥 Save user in database
                    set(ref(db, "users/" + user.uid), {
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        uid: user.uid
                    });

                    alert("Welcome " + user.displayName);

                    // 🔥 Redirect
                    window.location.href = "home.html";
                })
                .catch((error) => {
                    alert(error.message);
                });
        }
    </script>

</body>
</html>
