<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyfenix | Authenticating</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0c0f14;
            --card: #161b22;
            --accent: #00d2ff;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .login-card {
            width: 85%;
            max-width: 350px;
            padding: 40px 20px;
            background: var(--card);
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* --- Unique & Stylish Loader --- */
        .loader-wrapper {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .unique-spinner {
            width: 35px;
            height: 35px;
            border: 3px solid transparent;
            border-top: 3px solid var(--accent);
            border-right: 3px solid rgba(0, 210, 255, 0.1);
            border-bottom: 3px solid var(--accent);
            border-left: 3px solid rgba(0, 210, 255, 0.1);
            border-radius: 50%;
            animation: spin-unique 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin-unique {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* --- Login Button (Hidden by default) --- */
        #login-btn {
            display: none;
            margin-top: 35px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            color: #000;
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="login-card fade-in">
        <div class="logo-area">
            <div class="logo-text">TYFENIX</div>
            <p class="tagline">Super Fast Messenger</p>
        </div>

        <div id="auth-check" class="loader-wrapper">
            <div class="unique-spinner"></div>
            <p style="font-size: 10px; color: var(--text-dim);">Checking Neural Link...</p>
        </div>

        <button id="login-btn" onclick="googleLogin()">Login with Google</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
            authDomain: "indian-chat-61159.firebaseapp.com",
            projectId: "indian-chat-61159",
            storageBucket: "indian-chat-61159.firebasestorage.app",
            messagingSenderId: "584142839677",
            appId: "1:584142839677:web:40cd744a7fe77dc743f614"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loader = document.getElementById('auth-check');
        const loginBtn = document.getElementById('login-btn');

        // 🔥 Background Login Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // अगर लॉगिन मिल गया, तो सीधे होम पर भेजें
                window.location.href = "home.html";
            } else {
                // अगर लॉगिन नहीं है, तो लोडर हटाओ और बटन दिखाओ
                loader.style.display = "none";
                loginBtn.style.display = "block";
                loginBtn.classList.add('fade-in');
            }
        });

        window.googleLogin = async function() {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: "select_account" });
            
            // बटन दबाने पर फिर से लोडर दिखाएं
            loginBtn.style.display = "none";
            loader.style.display = "flex";

            try {
                await setPersistence(auth, browserLocalPersistence);
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const userRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userRef);

                if (!docSnap.exists()) {
                    await setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        uid: user.uid,
                        photo: user.photoURL || "",
                        createdAt: new Date().toISOString()
                    });
                }
                window.location.href = "home.html";
            } catch (error) {
                alert("Login Error: " + error.message);
                loader.style.display = "none";
                loginBtn.style.display = "block";
            }
        };
    </script>
</body>
</html>
