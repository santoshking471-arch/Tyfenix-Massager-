<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyfenix AI | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .orb-gradient {
            background: conic-gradient(from 180deg at 50% 50%, #4facfe 0deg, #7062f5 180deg, #ff0f7b 270deg, #4facfe 360deg);
            filter: blur(8px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center overflow-hidden">

    <div class="mt-10 flex flex-col items-center">
        <div class="relative w-24 h-24 flex items-center justify-center">
            <div id="orb-pulse" class="absolute inset-0 orb-gradient rounded-full opacity-60 animate-pulse"></div>
            <div class="absolute inset-1 bg-[#050505] rounded-full"></div>
            <div class="w-16 h-16 orb-gradient rounded-full animate-spin" style="animation-duration: 10s;"></div>
        </div>
        <h1 class="mt-6 text-xl font-light text-gray-300 tracking-wide">Good evening, S</h1>
    </div>

    <div id="chat-container" class="flex-1 w-full max-w-md px-5 mt-8 overflow-y-auto no-scrollbar pb-32 space-y-4">
        <div id="suggestions" class="grid grid-cols-1 gap-2.5">
            <button onclick="handlePrompt('I need relationship advice')" class="glass w-full flex items-center py-3.5 px-5 rounded-2xl transition-all active:scale-95 text-left hover:bg-white/10">
                <i data-lucide="heart" class="w-4 h-4 mr-4 text-gray-400"></i>
                <span class="text-sm font-light text-gray-300">I need relationship advice</span>
            </button>
            <button onclick="handlePrompt('Write a message to a coworker')" class="glass w-full flex items-center py-3.5 px-5 rounded-2xl transition-all active:scale-95 text-left hover:bg-white/10">
                <i data-lucide="mail" class="w-4 h-4 mr-4 text-gray-400"></i>
                <span class="text-sm font-light text-gray-300">Message to a coworker</span>
            </button>
            <button onclick="handlePrompt('Generate a cinematic image')" class="glass w-full flex items-center py-3.5 px-5 rounded-2xl transition-all active:scale-95 text-left hover:bg-white/10">
                <i data-lucide="image" class="w-4 h-4 mr-4 text-gray-400"></i>
                <span class="text-sm font-light text-gray-300">I want to make a picture</span>
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 w-full max-w-md px-4">
        <div class="glass flex items-center p-2 px-4 rounded-full shadow-2xl">
            <i data-lucide="paperclip" class="w-5 h-5 text-gray-400"></i>
            <input id="user-input" type="text" placeholder="Ask Tyfenix Ai..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm font-light">
            <button onclick="submitInput()" class="bg-[#22C55E] p-2 rounded-full active:scale-90">
                <i data-lucide="mic" id="action-icon" class="w-5 h-5 text-black"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- FIREBASE CONFIG SETUP ---
        const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const OPENAI_KEY = 'YOUR_OPENAI_KEY';
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // Toggle Icon
        userInput.addEventListener('input', (e) => {
            const icon = document.getElementById('action-icon');
            icon.setAttribute('data-lucide', e.target.value ? 'send' : 'mic');
            lucide.createIcons();
        });

        async function handlePrompt(prompt) {
            document.getElementById('suggestions').classList.add('hidden');
            addMessage(prompt, 'user');
            
            // Save User Message to Firebase
            saveToFirebase('user', prompt);

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [{role: "system", content: "You are Tyfenix Ai, a premium friendly assistant."}, {role: "user", content: prompt}]
                    })
                });
                const data = await res.json();
                const aiText = data.choices[0].message.content;
                
                addMessage(aiText, 'ai');
                saveToFirebase('ai', aiText); // Save AI Response
            } catch (err) { console.error(err); }
        }

        function saveToFirebase(sender, text) {
            db.collection("chats").add({
                sender: sender,
                message: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `p-4 rounded-2xl max-w-[80%] text-sm font-light ${sender === 'user' ? 'ml-auto glass text-white' : 'bg-white/5 text-gray-300 border border-white/5'}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function submitInput() {
            const val = userInput.value.trim();
            if(val) { handlePrompt(val); userInput.value = ''; }
        }
    </script>
</body>
</html>
