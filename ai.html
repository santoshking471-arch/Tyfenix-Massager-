<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyfenix AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .orb-neon { background: conic-gradient(from 180deg, #4facfe, #7062f5, #ff0f7b, #4facfe); filter: blur(15px); }
        .message-ai { background: rgba(255, 255, 255, 0.05); border-radius: 20px 20px 20px 5px; }
        .message-user { background: rgba(255, 255, 255, 0.1); border-radius: 20px 20px 5px 20px; border: 1px solid rgba(0, 242, 254, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col items-center">

    <div class="mt-10 flex flex-col items-center">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <div class="absolute inset-0 orb-neon rounded-full opacity-40 animate-pulse"></div>
            <div class="absolute inset-1 bg-[#050505] rounded-full"></div>
            <div class="w-12 h-12 orb-neon rounded-full animate-spin" style="animation-duration: 6s;"></div>
        </div>
        <h1 class="mt-4 text-gray-400 tracking-[0.2em] text-sm uppercase">Tyfenix AI</h1>
    </div>

    <div id="chat-box" class="flex-1 w-full max-w-md px-5 mt-8 overflow-y-auto no-scrollbar pb-32 space-y-4">
        <div id="suggestions" class="space-y-3">
            <button onclick="sendMsg('I need relationship advice')" class="glass w-full p-4 text-left text-sm text-gray-400 flex items-center gap-3 active:scale-95 transition-all">
                <i data-lucide="heart" class="w-4 h-4 text-pink-500"></i> I need relationship advice
            </button>
            <button onclick="sendMsg('Write a professional message')" class="glass w-full p-4 text-left text-sm text-gray-400 flex items-center gap-3 active:scale-95 transition-all">
                <i data-lucide="mail" class="w-4 h-4 text-cyan-400"></i> Write a message to a coworker
            </button>
            <button onclick="sendMsg('Generate a cinematic AI image')" class="glass w-full p-4 text-left text-sm text-gray-400 flex items-center gap-3 active:scale-95 transition-all">
                <i data-lucide="image" class="w-4 h-4 text-purple-500"></i> I want to make a picture (Nano)
            </button>
        </div>
    </div>

    <div class="fixed bottom-8 w-full max-w-md px-4">
        <div class="glass flex items-center p-2 px-5">
            <input id="user-input" type="text" placeholder="Ask Tyfenix Anything..." class="flex-1 bg-transparent outline-none py-2 text-sm text-white">
            <button onclick="handleInput()" class="bg-[#22C55E] p-2.5 rounded-full active:scale-90 transition-all">
                <i data-lucide="send" class="w-4 h-4 text-black"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // --- APNI NAYI KEY YAHAN DALO ---
        const KEY = "AIzaSyAEL44xn3YLyaKZ1A7PmLPqrYIsSWhX8u4";

        // Load chat from memory
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('tyfenix_chats') || "[]");
            if(saved.length > 0) {
                document.getElementById('suggestions').classList.add('hidden');
                saved.forEach(msg => renderMessage(msg.txt, msg.sender));
            }
        };

        async function sendMsg(text) {
            if(!text) return;
            document.getElementById('suggestions').classList.add('hidden');
            
            renderMessage(text, 'user');
            saveChat(text, 'user');

            try {
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await res.json();
                
                if (data.error) {
                    renderMessage("❌ API Error: " + data.error.message, 'ai');
                } else if (data.candidates && data.candidates[0]) {
                    const reply = data.candidates[0].content.parts[0].text;
                    renderMessage(reply, 'ai');
                    saveChat(reply, 'ai');
                }
            } catch (e) {
                renderMessage("⚠️ Network Error. Check connection.", 'ai');
            }
        }

        function handleInput() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(val) { sendMsg(val); input.value = ''; }
        }

        function renderMessage(txt, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `p-4 max-w-[85%] text-sm leading-relaxed ${sender === 'user' ? 'ml-auto message-user text-white' : 'message-ai text-gray-300'}`;
            div.innerText = txt;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function saveChat(txt, sender) {
            let chats = JSON.parse(localStorage.getItem('tyfenix_chats') || "[]");
            chats.push({txt, sender});
            localStorage.setItem('tyfenix_chats', JSON.stringify(chats));
        }

        document.getElementById('user-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleInput();
        });
    </script>
</body>
</html>
