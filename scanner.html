<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:#dcdcdc;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* CAMERA BOX */
.camera-box{
    width:85%;
    max-width:320px;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    position:relative;
}

/* CAMERA */
#reader{
    width:100%;
    height:100%;
}

/* SCAN BORDER */
.scan-border{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:4px solid red;
    border-radius:16px;
    pointer-events:none;
    transition:0.2s;
}

/* SEARCH BAR */
.search{
    margin-top:20px;
    width:85%;
    max-width:320px;
    height:42px;
    background:linear-gradient(90deg,#8e44ad,#3498db);
    border-radius:25px;
    display:flex;
    align-items:center;
    padding:0 10px;
}

.search input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:13px;
}

.search i{
    color:white;
    font-size:16px;
}

/* GALLERY BUTTON */
.gallery{
    margin-top:30px;
    width:65px;
    height:65px;
    border-radius:50%;
    border:2px solid #000;
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
}

.gallery i{
    font-size:28px;
    background:linear-gradient(45deg,#ff00cc,#00f2c3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- CAMERA -->
<div class="camera-box">
    <div id="reader"></div>
    <div class="scan-border" id="scanBorder"></div>
</div>

<!-- SEARCH -->
<div class="search">
    <input type="text" id="resultInput" placeholder="Scan result...">
    <i class="fas fa-search" onclick="openLink()"></i>
</div>

<!-- GALLERY -->
<div class="gallery" onclick="openGallery()">
    <i class="fas fa-image"></i>
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script>

let html5QrCode;
let detected = false;

/* START CAMERA */
async function start(){
    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 12,
            qrbox: 250
        },
        (decodedText)=>{
            detected = true;

            document.getElementById("scanBorder").style.borderColor = "lime";
            document.getElementById("resultInput").value = decodedText;
        },
        ()=>{
            if(!detected){
                document.getElementById("scanBorder").style.borderColor = "red";
            }
            detected = false;
        }
    );
}
start();

/* OPEN LINK */
function openLink(){
    let url = document.getElementById("resultInput").value;

    if(url.startsWith("http")){
        window.open(url, "_blank");
    }
}

/* GALLERY */
function openGallery(){
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    try{
        const result = await html5QrCode.scanFile(file,false);

        document.getElementById("scanBorder").style.borderColor = "lime";
        document.getElementById("resultInput").value = result;

        if(result.startsWith("http")){
            window.open(result,"_blank");
        }

    }catch{
        alert("QR detect nahi hua 😢");
    }
});
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</body>
</html>
