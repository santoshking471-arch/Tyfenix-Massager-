<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* CAMERA VIEW */
video{
    width:100%;
    height:100vh;
    object-fit:cover;
}

/* BOTTOM BAR */
.controls{
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
}

/* CAPTURE BUTTON */
.capture{
    width:70px;
    height:70px;
    border-radius:50%;
    border:4px solid white;
    background:transparent;
}

/* SEND BUTTON */
.send{
    position:fixed;
    right:20px;
    bottom:30px;
    background:#00f2c3;
    color:black;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
}

/* CONTACT PANEL */
.contacts{
    position:fixed;
    top:0;
    right:0;
    width:220px;
    height:100vh;
    background:#0f171c;
    overflow:auto;
    padding:10px;
}

.user{
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}
</style>
</head>

<body>

<video id="video" autoplay></video>

<div class="controls">
    <button class="capture" onclick="capture()"></button>
</div>

<button class="send" onclick="sendImage()">Send To</button>

<div class="contacts" id="contacts">
    <h4>Contacts</h4>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */  
const firebaseConfig = {  
  apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",  
  authDomain: "indian-chat-61159.firebaseapp.com",  
  databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",  
  projectId: "indian-chat-61159",  
  storageBucket: "indian-chat-61159.firebasestorage.app",  
  messagingSenderId: "584142839677",  
  appId: "1:584142839677:web:40cd744a7fe77dc743f614",  
  measurementId: "G-5S9873P202"  
};  

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;
let selectedUser = null;
let capturedImage = null;

/* CAMERA START */
navigator.mediaDevices.getUserMedia({ video:true })
.then(stream=>{
    document.getElementById("video").srcObject = stream;
});

/* LOAD CONTACTS */
onAuthStateChanged(auth, async (user)=>{
    if(!user) return;
    currentUser = user;

    const snap = await getDocs(collection(db,"users"));

    snap.forEach(docu=>{
        let data = docu.data();

        if(docu.id !== user.uid){
            let div = document.createElement("div");
            div.className = "user";
            div.innerText = data.name;

            div.onclick = ()=> selectedUser = docu.id;

            document.getElementById("contacts").appendChild(div);
        }
    });
});

/* CAPTURE IMAGE */
window.capture = function(){
    let video = document.getElementById("video");

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video,0,0);

    capturedImage = canvas.toDataURL("image/png");

    alert("Captured ✔");
};

/* SEND IMAGE (demo) */
window.sendImage = function(){
    if(!selectedUser){
        alert("Select contact first");
        return;
    }

    if(!capturedImage){
        alert("Capture image first");
        return;
    }

    alert("Image ready to send (chat system next step)");
};

</script>

</body>
  </html>
