<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:black;
    overflow:hidden;
}

/* CAMERA */
video{
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* CAPTURE BUTTON */
.capture{
    position:fixed;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    width:65px;
    height:65px;
    border-radius:50%;
    border:4px solid white;
    background:transparent;
}

/* ================= PREVIEW ================= */
.preview{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    display:none;
}

.preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* BOTTOM SEND BAR */
.sendBar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(15,23,28,0.95);
    padding:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
}

.sendBtn{
    background:#00f2c3;
    color:black;
    border:none;
    padding:8px 14px;
    border-radius:10px;
    font-weight:bold;
}

/* ================= CONTACTS ================= */
.contacts{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:#0f171c;
    display:none;
    flex-direction:column;
    padding:15px;
}

.contactCard{
    background:#161b22;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    color:white;
    cursor:pointer;
    border:1px solid #222;
}

.title{
    color:#00f2c3;
    font-weight:bold;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>

<button class="capture" onclick="capture()"></button>

<!-- PREVIEW -->
<div class="preview" id="preview">
    <img id="previewImg">
    
    <div class="sendBar">
        <span>Send this image</span>
        <button class="sendBtn" onclick="openContacts()">Send To</button>
    </div>
</div>

<!-- CONTACTS -->
<div class="contacts" id="contacts">
    <div class="title">Select Contact</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCA...",
  authDomain: "indian-chat-61159.firebaseapp.com",
  projectId: "indian-chat-61159"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let capturedImage = null;
let selectedUser = null;

/* CAMERA START */
navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"user" }
}).then(stream=>{
    document.getElementById("video").srcObject = stream;
});

/* CAPTURE */
window.capture = function(){
    const video = document.getElementById("video");

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video,0,0);

    capturedImage = canvas.toDataURL("image/jpeg",0.85);

    document.getElementById("previewImg").src = capturedImage;
    document.getElementById("preview").style.display = "block";
};

/* OPEN CONTACTS */
window.openContacts = async function(){

    document.getElementById("contacts").style.display = "flex";

    const snap = await getDocs(collection(db,"users"));

    const box = document.getElementById("contacts");
    box.innerHTML = `<div class="title">Select Contact</div>`;

    snap.forEach(u=>{
        let data = u.data();

        let div = document.createElement("div");
        div.className = "contactCard";
        div.innerText = data.name;

        div.onclick = ()=> selectedUser = u.id;

        box.appendChild(div);
    });
};

</script>

</body>
</html>
