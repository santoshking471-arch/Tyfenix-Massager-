<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyfenix | Working UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #080d10;
            --header: #0f171c;
            --text-main: #f0f5f8;
            --text-dim: #94a3b8;
            --accent: #00f2c3;
            --search-bg: #1a242b;
            --nav-bg: #0f171c;
            --purple: #a855f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text-main); }
        body { display: flex; flex-direction: column; }

        /* --- Slim Header --- */
        header {
            background: var(--header);
            padding: 8px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 0.5px solid #1e293b;
        }
        header .logo { 
            font-size: 19px; 
            font-weight: 700; 
            background: linear-gradient(45deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-icons { display: flex; gap: 16px; font-size: 15px; color: var(--text-dim); }
        .header-icons i:active { color: var(--accent); }

        /* --- Page Switcher Logic --- */
        .page { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
        .page.active { display: flex; }

        /* --- Shared Components --- */
        .search-container { padding: 6px 12px; flex-shrink: 0; }
        .search-bar {
            background: var(--search-bg);
            border-radius: 12px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; }
        
        .filters { display: flex; gap: 6px; padding: 2px 12px 8px; overflow-x: auto; flex-shrink: 0; }
        .filter-chip { padding: 3px 10px; border-radius: 8px; font-size: 11px; color: var(--text-dim); border: 1px solid #1e293b; white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: var(--accent); color: #000; font-weight: 600; border: none; }

        /* --- Chat/Item List Styles --- */
        .list-item {
            display: flex;
            padding: 10px 16px;
            gap: 12px;
            align-items: center;
            border-bottom: 0.5px solid #141e26;
            cursor: pointer;
        }
        .list-item:active { background: #1a242b; }
        .item-icon { width: 40px; height: 40px; border-radius: 10px; background: #1a242b; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 18px; }
        .item-info { flex: 1; }
        .item-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .item-desc { font-size: 11px; color: var(--text-dim); }

        /* --- Ultra Slim Bottom Nav --- */
        nav {
            background: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            padding: 4px 0 2px;
            border-top: 0.5px solid #1e293b;
            flex-shrink: 0;
        }
        .nav-item { text-align: center; color: var(--text-dim); width: 25%; cursor: pointer; }
        .nav-item i { 
            font-size: 14px; 
            display: inline-block; 
            padding: 2px 14px; 
            border-radius: 10px; 
            margin-bottom: 2px;
            transition: 0.2s;
        }
        .nav-item div { font-size: 10px; } 
        .nav-item.active { color: var(--accent); font-weight: 600; }
        .nav-item.active i { background: rgba(0, 242, 195, 0.1); }

        /* Tiny FAB */
        .fab {
            position: fixed;
            bottom: 65px;
            right: 15px;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Tyfenix</div>
        <div class="header-icons">
            <i class="fas fa-qrcode" onclick="alert('Scanner Open')"></i>
            <i class="fas fa-camera" onclick="alert('Camera Open')"></i>
            <i class="fas fa-ellipsis-vertical" onclick="alert('Menu Open')"></i>
        </div>
    </header>

    <div id="chats-page" class="page active">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-bolt"></i>
                <input type="text" placeholder="Ask Tyfenix AI...">
            </div>
        </div>
        <div class="filters">
            <div class="filter-chip active" onclick="toggleFilter(this)">All</div>
            <div class="filter-chip" onclick="toggleFilter(this)">Unread</div>
            <div class="filter-chip" onclick="toggleFilter(this)">Groups</div>
            <div class="filter-chip" onclick="toggleFilter(this)">Work</div>
        </div>
        <div class="chat-list" id="chat-container">
            <div class="list-item" onclick="alert('Opening Tyfenix Bot...')">
                <div class="item-icon"><i class="fas fa-robot"></i></div>
                <div class="item-info">
                    <div class="item-name">Tyfenix AI</div>
                    <div class="item-desc">How can I help you today?</div>
                </div>
            </div>
        </div>
    </div>

    <div id="explore-page" class="page">
        <div style="padding: 20px; text-align: center;">
            <i class="fas fa-compass" style="font-size: 30px; color: var(--accent); margin-bottom: 10px;"></i>
            <h3>Explore AI</h3>
            <p style="color: var(--text-dim); font-size: 12px; margin-top: 5px;">Discover latest AI models and tools.</p>
        </div>
    </div>

    <div id="groups-page" class="page">
        <div class="list-item">
            <div class="item-icon"><i class="fas fa-users"></i></div>
            <div class="item-info">
                <div class="item-name">Global Devs</div>
                <div class="item-desc">Santosh: Code is working!</div>
            </div>
        </div>
    </div>

    <div id="settings-page" class="page">
        <div class="list-item" onclick="alert('Profile Clicked')"><i class="fas fa-user-circle"></i> Profile</div>
        <div class="list-item" onclick="alert('Theme Clicked')"><i class="fas fa-palette"></i> Appearance</div>
        <div class="list-item" onclick="alert('Help Clicked')"><i class="fas fa-circle-question"></i> Help Center</div>
    </div>

    <div class="fab" onclick="alert('Starting New Conversation...')">
        <i class="fas fa-plus"></i>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('chats-page', this)">
            <i class="fas fa-comment-dots"></i>
            <div>Chats</div>
        </div>
        <div class="nav-item" onclick="switchTab('explore-page', this)">
            <i class="fas fa-compass"></i>
            <div>Explore</div>
        </div>
        <div class="nav-item" onclick="switchTab('groups-page', this)">
            <i class="fas fa-layer-group"></i>
            <div>Groups</div>
        </div>
        <div class="nav-item" onclick="switchTab('settings-page', this)">
            <i class="fas fa-user-gear"></i>
            <div>Settings</div>
        </div>
    </nav>

    <script>
        // Tab Switching Logic
        function switchTab(pageId, navElement) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Show selected page
            document.getElementById(pageId).classList.add('active');

            // Update Nav UI
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            navElement.classList.add('active');
        }

        // Filter Chip Toggle
        function toggleFilter(chip) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
        }
    </script>

</body>
</html>
