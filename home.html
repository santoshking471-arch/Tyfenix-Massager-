<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tyfenix | Full Restored</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #080d10; --header: #0f171c; --text-main: #f0f5f8; --text-dim: #94a3b8; --accent: #00f2c3; --search-bg: #1a242b; --nav-bg: #0f171c; --purple: #a855f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { background: var(--header); padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #1e293b; flex-shrink: 0; }
        .logo { font-size: 19px; font-weight: 700; background: linear-gradient(45deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-icons { display: flex; gap: 16px; font-size: 15px; color: var(--text-dim); }

        /* WhatsApp Full Menu */
        .menu-box { position: fixed; top: 50px; right: 8px; width: 180px; background: #1f2c34; border-radius: 10px; display: none; z-index: 999; box-shadow: 0 6px 20px rgba(0,0,0,0.4); padding: 4px 0; }
        .menu-box div { padding: 10px 16px; font-size: 14px; color: #e9edef; cursor: pointer; white-space: nowrap; }
        .menu-box div:active { background: #2a3942; }
        .menu-box.show { display: block; }

        /* Pages */
        .page { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding-bottom: 70px; }
        .page.active { display: flex; }

        /* AI Glass Button */
        .ai-btn-glass { cursor: pointer; padding: 15px; margin: 12px; border-radius: 15px; background: rgba(255, 255, 255, 0.05); color: #fff; text-align: center; transition: 0.3s; border: 1px solid rgba(0, 242, 254, 0.5); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .ai-btn-glass:hover { border: 1px solid #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); transform: translateY(-2px); }

        /* Search & Filters */
        .search-container { padding: 6px 12px; }
        .search-bar { background: var(--search-bg); border-radius: 12px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 13px; }
        .filters { display: flex; gap: 6px; padding: 2px 12px 8px; overflow-x: auto; flex-shrink: 0; }
        .filter-chip { padding: 3px 10px; border-radius: 8px; font-size: 11px; color: var(--text-dim); border: 1px solid #1e293b; white-space: nowrap; }
        .filter-chip.active { background: var(--accent); color: #000; font-weight: 600; }

        /* Chat List */
        .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid rgba(255,255,255,0.03); cursor: pointer; }
        .user-dp { width: 48px; height: 48px; border-radius: 14px; border: 1px solid var(--accent); object-fit: cover; }

        /* FAB & Nav */
        .fab { position: fixed; bottom: 75px; right: 15px; background: linear-gradient(135deg, var(--accent), var(--purple)); width: 45px; height: 45px; border-radius: 14px; display: flex; justify-content: center; align-items: center; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        nav { background: var(--nav-bg); display: flex; justify-content: space-around; padding: 8px 0; border-top: 0.5px solid #1e293b; position: fixed; bottom: 0; width: 100%; }
        .nav-item { text-align: center; color: var(--text-dim); width: 25%; font-size: 10px; }
        .nav-item i { font-size: 16px; margin-bottom: 2px; display: block; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo">Tyfenix</div>
        <div class="header-icons">
            <i class="fas fa-qrcode" onclick="location.href='scanner.html'"></i>
            <i class="fas fa-camera" onclick="location.href='camera.html'"></i>
            <i class="fas fa-ellipsis-vertical" id="menuBtn"></i>
        </div>
    </header>

    <div id="menuBox" class="menu-box">
        <div onclick="menuClick('New group')">New group</div>
        <div onclick="menuClick('New community')">New community</div>
        <div onclick="menuClick('Broadcast lists')">Broadcast lists</div>
        <div onclick="menuClick('Linked devices')">Linked devices</div>
        <div onclick="menuClick('Starred')">Starred</div>
        <div onclick="menuClick('Payments')">Payments</div>
        <div onclick="menuClick('Read all')">Read all</div>
        <div onclick="menuClick('Settings')">Settings</div>
    </div>

    <div id="chats-page" class="page active">
        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-bolt" style="color:var(--accent)"></i>
                <input type="text" placeholder="Ask Tyfenix AI...">
            </div>
        </div>
        <div class="filters">
            <div class="filter-chip active">All</div>
            <div class="filter-chip">Unread</div>
            <div class="filter-chip">Groups</div>
            <div class="filter-chip">Work</div>
        </div>

        <div class="ai-btn-glass" onclick="location.href='ai.html'">
            <i class="fas fa-robot" style="color: #00f2fe; margin-right: 8px;"></i> Open Tyfenix AI
        </div>

        <div id="chat-list-container">
            <div style="padding:40px; text-align:center; color:var(--text-dim); font-size:11px;">Syncing Neural Chats...</div>
        </div>
    </div>

    <div id="explore-page" class="page"><div style="padding:40px; text-align:center;">Explore AI Models</div></div>
    <div id="groups-page" class="page"><div style="padding:40px; text-align:center;">Community Groups</div></div>
    <div id="settings-page" class="page"><div style="padding:40px; text-align:center;">Account Settings</div></div>

    <div class="fab" onclick="location.href='newchat.html'"><i class="fas fa-plus"></i></div>

    <nav>
        <div class="nav-item active" onclick="switchTab('chats-page', this)">
            <i class="fas fa-comment-dots"></i><div>Chats</div>
        </div>
        <div class="nav-item" onclick="switchTab('explore-page', this)">
            <i class="fas fa-compass"></i><div>Explore</div>
        </div>
        <div class="nav-item" onclick="switchTab('groups-page', this)">
            <i class="fas fa-layer-group"></i><div>Groups</div>
        </div>
        <div class="nav-item" onclick="switchTab('settings-page', this)">
            <i class="fas fa-user-gear"></i><div>Settings</div>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, doc, getDoc, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
            authDomain: "indian-chat-61159.firebaseapp.com",
            projectId: "indian-chat-61159",
            storageBucket: "indian-chat-61159.firebasestorage.app",
            messagingSenderId: "584142839677",
            appId: "1:584142839677:web:40cd744a7fe77dc743f614"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const chatListContainer = document.getElementById("chat-list-container");

        onAuthStateChanged(auth, (user) => {
            if (user) loadChatList(user.uid);
            else chatListContainer.innerHTML = "<div style='padding:20px;text-align:center;'>Please Login</div>";
        });

        

        async function renderChatItem(chatId, otherUid, myUid) {
            const uSnap = await getDoc(doc(db, "users", otherUid));
            const uData = uSnap.data() || { name: "User" };
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("time", "desc"), limit(1));
            onSnapshot(q, (mSnap) => {
                const lastM = mSnap.docs[0]?.data();
                const old = document.getElementById("chat-" + chatId);
                if(old) old.remove();

                const html = `
                    <div class="list-item" id="chat-${chatId}" onclick="location.href='chat.html?uid=${otherUid}'">
                        <img src="${uData.photo || 'https://ui-avatars.com/api/?name='+uData.name}" class="user-dp">
                        <div style="flex:1; min-width:0;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-size:14px; font-weight:600;">${uData.name}</span>
                                <span style="font-size:9px; color:var(--text-dim);">${lastM ? new Date(lastM.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                            </div>
                            <p style="font-size:12px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px;">
                                ${lastM ? lastM.text : 'New chat'}
                            </p>
                        </div>
                    </div>`;
                chatListContainer.insertAdjacentHTML('afterbegin', html);
            });
        }

        // --- Menu & Tab Functions ---
        const menuBtn = document.getElementById('menuBtn');
        const menuBox = document.getElementById('menuBox');

        menuBtn.onclick = (e) => { e.stopPropagation(); menuBox.classList.toggle('show'); };
        document.onclick = () => menuBox.classList.remove('show');

        window.switchTab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };

        window.menuClick = (opt) => {
            if(opt === 'Settings') location.href = 'settings.html';
            else alert(opt + " coming soon!");
        };
    </script>
</body>
</html>
