<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #e5ddd5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 100%; max-width: 400px; background: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* DP section */
        .header-profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
        .dp { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid #008069; margin-bottom: 15px; }
        
        h2 { color: #111b21; font-size: 22px; }
        .email { color: #54656f; font-size: 14px; margin-bottom: 5px; }
        
        /* Bio Section */
        .bio { background: #f0f2f5; padding: 15px; border-radius: 10px; font-size: 14px; color: #3b4a54; margin-bottom: 20px; text-align: center; }
        
        /* Options (WhatsApp style) */
        .option-item { display: flex; align-items: center; padding: 12px 0; border-top: 1px solid #f2f2f2; cursor: pointer; color: #dc2626; font-weight: 500; font-size: 15px; }
        .option-item span { margin-right: 15px; color: #54656f; }
        .report { color: #ea580c; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-profile">
            <img src="https://via.placeholder.com/150" id="dp" class="dp">
            <h2 id="name">Loading...</h2>
            <p class="email" id="email">Loading...</p>
        </div>

        <div class="bio" id="bio">Loading bio...</div>

        <div class="option-item" onclick="blockUser()"><span>block</span> Block User</div>
        <div class="option-item report" onclick="reportUser()"><span>report</span> Report User</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

        const firebaseConfig = { /* Apna config yahan paste karein */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        async function loadData(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('name').innerText = d.name;
                document.getElementById('email').innerText = d.email;
                document.getElementById('bio').innerText = d.bio;
                document.getElementById('dp').src = d.profilePic;
            }
        }
        loadData("USER_ID_YAHAN_DAALEIN");
    </script>
</body>
</html>
