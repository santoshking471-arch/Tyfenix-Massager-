<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tyfenix | Profile</title>

<style>
:root{
    --bg:#080d10;
    --card:#0f171c;
    --accent:#00f2c3;
    --text:#f0f5f8;
    --dim:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
header{
    background:var(--card);
    padding:12px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
}

/* PROFILE CARD */
.container{
    padding:20px;
    flex:1;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    text-align:center;
}

/* DP */
.dp{
    width:90px;
    height:90px;
    border-radius:50%;
    border:2px solid var(--accent);
    object-fit:cover;
}

/* INPUT */
input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1a242b;
    color:white;
    outline:none;
}

/* BUTTON */
button{
    margin-top:15px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#00f2c3,#00bcd4);
    font-weight:bold;
    cursor:pointer;
}

/* INFO */
.info{
    margin-top:10px;
    color:var(--dim);
    font-size:13px;
}
</style>
</head>

<body>

<header>PROFILE SETTINGS</header>

<div class="container">

<div class="card">

    <!-- DP -->
    <img id="photo" class="dp" src="https://i.imgur.com/0y0y0y0.png">

    <input type="file" id="dpUpload" accept="image/*">

    <!-- NAME -->
    <input type="text" id="nameInput" placeholder="Enter Name">

    <!-- BIO -->
    <input type="text" id="bioInput" placeholder="Enter Bio">

    <!-- EMAIL (read only) -->
    <input type="text" id="email" readonly>

    <button onclick="uploadDP()">Save Profile</button>

    <div class="info" id="uid"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCAzhJoQqoQ1xOEty_q2nLA5BjQcpyOMCA",
  authDomain: "indian-chat-61159.firebaseapp.com",
  databaseURL: "https://indian-chat-61159-default-rtdb.firebaseio.com",
  projectId: "indian-chat-61159",
  storageBucket: "indian-chat-61159.firebasestorage.app",
  messagingSenderId: "584142839677",
  appId: "1:584142839677:web:40cd744a7fe77dc743f614",
  measurementId: "G-5S9873P202"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser;

/* LOAD USER */
onAuthStateChanged(auth, async (user)=>{
    if(user){
        currentUser = user;

        document.getElementById("email").value = user.email;
        document.getElementById("uid").innerText = "UID: " + user.uid;

        onValue(ref(db, "users/" + user.uid), (snap) => {
    if (snap.exists()) {
        const data = snap.val();

        document.getElementById("nameInput").value = data.name || "";
        document.getElementById("bioInput").value = data.bio || "";
        document.getElementById("photo").src = data.photo || user.photoURL;
    }
});

/* SAVE + UPLOAD DP */
window.uploadDP = async function(){

    if(!currentUser) return;

    const file = document.getElementById("dpUpload").files[0];
    const name = document.getElementById("nameInput").value;
    const bio = document.getElementById("bioInput").value;

    let photoURL = document.getElementById("photo").src;

    /* IF NEW IMAGE */
    if(file){
        const imgRef = sRef(storage,"dp/"+currentUser.uid);
        await uploadBytes(imgRef,file);
        photoURL = await getDownloadURL(imgRef);
    }

    /* SAVE TO DATABASE */
    await set(ref(db,"users/"+currentUser.uid),{
        name:name,
        bio:bio,
        email:currentUser.email,
        photo:photoURL,
        uid:currentUser.uid
    });

    document.getElementById("photo").src = photoURL;

    alert("Profile Updated 🚀");
};

</script>

</body>
</html>
